name: build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

  workflow_dispatch: # manual trigger

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ['ubuntu-22.04']
        cuda_version: [12.5]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev python3-pip libopenexr-dev libxi-dev \
                                   libglfw3-dev libglew-dev libomp-dev libxinerama-dev libxcursor-dev

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.23
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda_version }}

      - name: Clone instant-ngp repository
        run: git clone --recursive https://github.com/nvlabs/instant-ngp

      - name: Build and install
        run: |
          export PATH="/usr/local/cuda/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/local/cuda/lib64:$LD_LIBRARY_PATH"

          cd instant-ngp
          cmake . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DNGP_BUILD_WITH_GUI=off
          cmake --build build --config RelWithDebInfo -j

      - name: List objects
        run: ls -lR instant-ngp
